<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дошка оголошень</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="./dist/main.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">KpiBoard</div>
        
        <div class="user-panel">
            <button type="button" id="auth-btn" class="btn outline">Увійти</button>
            <span id="user-greeting" hidden>Привіт, <span id="user-name-display"></span></span>
        </div>
    </header>
           <div id="notice" class="notice-container"></div>

    <div class="layout-wrapper">
        
        <div class="sidebar">
            <h3>Категорії</h3>
            <ul id="category-list" class="category-menu">
                <li class="active" data-category="all">Всі категорії</li>
                <li data-category="Новини">Новини</li>
                <li data-category="Події">Події</li>
                <li data-category="Загублені речі">Загублені речі</li>
                <li data-category="Навчання">Навчання</li>
                <li data-category="Спорт">Спорт</li>
                <li data-category="Меми">Меми</li>
            </ul>
         </div>
  
        <main id="app-root" class="content">
            
            <div id="view-list" class="view-section">
                
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Пошук за заголовком...">
                    </div>
                    <button type="button" id="create-post-btn" class="btn primary">Створити пост</button>
                </div>

                <div class="table-container">
                    <table id="posts-table">
                        <thead>
                            <tr>
                                <th class="sortable" data-field="title">Заголовок</th>
                                <th class="sortable" data-field="category">Категорія</th>
                                <th>Текст</th>
                                <th class="sortable" data-field="authorName">Автор</th>
                                <th class="sortable" data-field="date">Дата</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="posts-body">
                            </tbody>
                    </table>
                </div>
            </div>
            <div id="view-form" class="view-section" hidden>
    <div class="toolbar">
        <h2>Створити оголошення</h2>
        <button type="button" id="back-to-list-btn" class="btn outline">Назад до списку</button>
    </div>

    <form id="create-post-form" class="panel">
        <div class="field">
            <label for="title">Заголовок</label>
            <input type="text" id="title" name="title" required maxlength="70" placeholder="Що продаємо/шукаємо?">
        </div>

        <div class="field">
            <label for="category">Категорія</label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Оберіть категорію...</option>
                <option value="Новини">Новини</option>
                <option value="Події">Події</option>
                <option value="Загублені речі">Загублені речі</option>
                <option value="Навчання">Навчання</option>
                <option value="Спорт">Спорт</option>
                <option value="Меми">Меми</option>
            </select>
        </div>

        <div class="field">
            <label for="content">Текст оголошення</label>
            <textarea id="content" name="content" rows="4" maxlength="500" placeholder="Опишіть деталі..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn primary">Опублікувати</button>
        </div>
    </form>
</div>
            <div id="view-post" class="view-section" hidden>
                </div>

        </main>
    </div>

</body>
</html>
